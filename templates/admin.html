<!DOCTYPE html>
<html>
<head>
    <title>0 Piso Admin Panel</title>
    <style>
        /* The Overlay Background */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Dark transparent bg */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        /* The Login Box */
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #ffa500;
            text-align: center;
            color: white;
        }
        .login-box input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }
        /* Style to blur content when locked */
        .blurred { filter: blur(8px); pointer-events: none; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='child.css') }}">
</head>
<body>

    {% if not logged_in %}
    <div class="login-overlay">
        <div class="login-box">
            <h2>Admin Authentication</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" style="background:#ffa500; border:none; padding:10px 20px; cursor:pointer;">Access System</button>
            </form>
            {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        </div>
    </div>
    {% endif %}

    <div class="{% if not logged_in %}blurred{% endif %}">
        <h1>Admin Control Panel</h1>
        
        <div style="margin-bottom: 20px;">
            <a href="{{ url_for('export_csv') }}"><button>Export to CSV</button></a>
            
            <form action="/wipe_db" method="POST" style="display:inline;" onsubmit="return confirm('WARNING: This will delete ALL data. Continue?');">
                <button type="submit" style="background-color:red; color:white;">Wipe All Data</button>
            </form>
            
            <a href="/logout" style="color:#ffa500; margin-left: 20px;">Logout</a>
        </div>

        <h2>Transaction History</h2>
        <table border="1" width="100%" style="color: white; border-collapse: collapse;">
            <tr style="background: #333;">
                <th>Time</th>
                <th>Student Name</th>
                <th>Amount (P)</th>
            </tr>
            {% for row in history %}
            <tr>
                <td>{{ row.timestamp }}</td>
                <td>{{ row.name }}</td>
                <td>{{ row.amount }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</body>
</html>
