<!DOCTYPE html>
<html>
<head>
    <title>0 Piso Balance Check</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='child.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand"><span>0</span> Piso</a>
        <div class="nav-links">
            <a href="register.html"><span class="nav-icon">🪪</span> Register</a>
            <a href="payment.html"><span class="nav-icon">🛒</span> Payment</a>
            <a href="topup.html"><span class="nav-icon">💳</span> Top-Up</a>
            <a href="check_balance.html" class="active"><span class="nav-icon">📊</span> Balance</a>
        </div>
    </nav>
    
    <main> <!-- actual place to view balance not here -->
        <h1>Check Balance</h1>
        <br><form action="/check_balance.html" method="POST">
            <input type="text" name="uid" placeholder="Tap Card" autofocus required><br>
            <button type="submit" class="btn">View Balance</button>
        </form>

        {% if message %}
            <div class="result-box">
                <p>{{ message }}</p>
            </div>
        {% endif %}
    </main>

    <footer>
        <span>0 Piso Cash Card System &mdash; Localhost</span>
        <span class="version">v1.0</span>
    </footer>
</body>
</html>
