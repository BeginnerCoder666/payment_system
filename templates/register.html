<!DOCTYPE html>
<html>
<head>
    <title>0 Piso Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='child.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="brand"><span>0</span> Piso</a>
        <div class="nav-links">
            <a href="register.html" class="active"><span class="nav-icon">🪪</span> Register</a>
            <a href="payment.html"><span class="nav-icon">🛒</span> Payment</a>
            <a href="topup.html"><span class="nav-icon">💳</span> Top-Up</a>
            <a href="check_balance.html"><span class="nav-icon">📊</span> Balance</a>
        </div>
    </nav>
    
    <main>
        <h1>Register New Student</h1>
        <br><form action="/register.html" method="POST">
            <input type="text" name="uid" placeholder="Tap Card Here" autofocus required><br><br>
            <input type="text" name="name" placeholder="Student Name" required><br>
            <button type="submit" class="btn">Register Card</button>
        </form>

        {% if message %}
            <div class="result-box">
                <p>{{ message }}</p>
            </div>
        {% endif %}
    </main>

    <footer>
        <span>0 Piso Cash Card System &mdash; Localhost</span>
        <span class="version">v1.0</span>
    </footer>
</body>
</html>
